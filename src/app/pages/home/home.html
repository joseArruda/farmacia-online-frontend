<app-navbar (eventText)="filterProduct($event)" />
<main class="home-container">
  <section class="home-card-product">
    <app-product-card
      class="product-card"
      *ngFor="let product of product"
      [product]="product"
      (add)="addCart(product.id)"
    />
  </section>

  <div class="buttons-next-prev-container">
    <button class="btn back-page" [routerLink]="['/']" [queryParams]="{ page: currentPage - 1 }">
      <img src="assets/icons/arrow.svg" alt="" />
      Voltar
    </button>
    <button class="btn next-page" [routerLink]="['/']" [queryParams]="{ page: currentPage + 1 }">
      Avançar
      <img src="assets/icons/arrow.svg" alt="" />
    </button>
  </div>
</main>
